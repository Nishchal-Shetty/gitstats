version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitstats-backend
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
    env_file:
      - backend/.env
    depends_on:
      - redis

  analytics:
    build:
      context: ./backend
      dockerfile: Dockerfile.analytics
    container_name: gitstats-analytics
    env_file:
      - backend/.env
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: gitstats-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: gitstats-redis
    ports:
      - "6379:6379"