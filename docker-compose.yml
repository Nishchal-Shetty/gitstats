version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: gitstats-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    env_file:
      - backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: gitstats-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend