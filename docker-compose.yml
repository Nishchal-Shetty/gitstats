services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitstats-backend
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
    env_file:
      - backend/.env
    depends_on:
      - redis

  analytics:
    build:
      context: ./backend
      dockerfile: Dockerfile.analytics
    container_name: gitstats-analytics
    env_file:
      - backend/.env
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: gitstats-frontend
    ports:
      - "5173:80"
    env_file:
      - frontend/.env

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: gitstats-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: gitstats-grafana
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  redis:
    image: redis:7-alpine
    container_name: gitstats-redis
    ports:
      - "6379:6379"
