services:
  backend:
    build:
      context: ./backend
    container_name: gitstats-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    env_file:
      - backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: gitstats-frontend
    ports:
      - "5173:80"
    env_file:
      - frontend/.env
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: gitstats-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.2.0
    container_name: gitstats-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
