version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: gitstats-backend
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
    env_file:
      - backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: gitstats-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend