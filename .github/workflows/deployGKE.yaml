name: Build & Deploy (GKE) with grafana and prometheus

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  GCP_REGION: us-central1
  GCP_REPOSITORY: git-stats
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  GKE_CLUSTER: autopilot-cluster-1
  GKE_REGION: us-central1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: docker/setup-buildx-action@v3
      if: "!startsWith(github.ref, 'refs/tags/')"

    # Version logic
    - name: Determine version
      id: version
      run: |
        git fetch --tags

        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Using existing tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          exit 0
        fi

        latest_tag=$(git tag --sort=-v:refname | head -n 1)

        if [ -z "$latest_tag" ]; then
          new_tag="v0.1.0"
        else
          version=${latest_tag#v}
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))
          new_tag="v$major.$minor.$patch"
        fi

        echo "tag=$new_tag" >> $GITHUB_OUTPUT

    - name: Create and push tag
      if: "!startsWith(github.ref, 'refs/tags/')"
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}

    # Auth (required for deploy)
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY_GHCR }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.GCP_PROJECT_ID }}

    - name: Install GKE auth plugin
      run: gcloud components install gke-gcloud-auth-plugin --quiet

    - name: Set auth plugin env
      run: echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> $GITHUB_ENV

    - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

    - name: Connect to GKE cluster
      run: |
        gcloud container clusters get-credentials $GKE_CLUSTER \
          --region $GKE_REGION \
          --project $GCP_PROJECT_ID

    # Metadata (still needed for tag resolution)
    - id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-backend
          ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/backend
        tags: |
          type=raw,value=${{ steps.version.outputs.tag }}

    - id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-frontend
          ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/frontend
        tags: |
          type=raw,value=${{ steps.version.outputs.tag }}

    # Create metadata for Analytics
    - id: meta-analytics
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-analytics
          ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/analytics
        tags: |
          type=raw,value=${{ steps.version.outputs.tag }}

    # Build images
    - name: Build & push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}

    - name: Build & push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        build-args: |
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_GITHUB_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }}
        tags: ${{ steps.meta-frontend.outputs.tags }}

    # Build & push Analytics
    - name: Build & push analytics
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile.analytics
        push: true
        tags: ${{ steps.meta-analytics.outputs.tags }}

    # Deploy to GKE
    - name: Create Kubernetes secrets
      run: |
        kubectl create secret generic backend-secrets \
          --from-literal=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --from-literal=SECRET_KEY=${{ secrets.SECRET_KEY }} \
          --from-literal=GITHUB_TOKEN=${{ secrets.GIT_TOKEN }} \
          --from-literal=GITHUB_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }} \
          --from-literal=GITHUB_CLIENT_SECRET=${{ secrets.GIT_CLIENT_SECRET }} \
          --from-literal=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
          --from-literal=REDIS_HOST=10.14.104.115 \
          --from-literal=REDIS_PORT=6379 \
          --dry-run=client -o yaml | kubectl apply -f -
          
    - name: Apply backend
      run: |
        sed "s|__BACKEND_IMAGE__|${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/backend:${{ steps.version.outputs.tag }}|g" k8s/backend-deployment.yaml | kubectl apply -f -

    - name: Apply frontend
      run: |
        sed "s|__FRONTEND_IMAGE__|${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/frontend:${{ steps.version.outputs.tag }}|g" k8s/frontend-deployment.yaml | kubectl apply -f -

    - name: Apply analytics with image injected
      run: |
        sed "s|__ANALYTICS_IMAGE__|${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/analytics:${{ steps.version.outputs.tag }}|g" k8s/analytics-deployment.yaml | kubectl apply -f -
    
    - name: Deploy Prometheus Config
      run: |
        kubectl apply -f k8s/prometheus-config.yaml

    # Prometheus
    - name: Deploy Prometheus
      run: |
        kubectl apply -f k8s/prometheus-deployment.yaml
        kubectl apply -f k8s/prometheus-service.yaml

    # Grafana Config
    - name: Deploy Grafana Config
      run: |
        kubectl apply -f k8s/grafana-datasources-config.yaml
        kubectl apply -f k8s/grafana-dashboard-provider-config.yaml
        kubectl apply -f k8s/grafana-dashboard-json-config.yaml

    # Grafana
    - name: Deploy Grafana
      run: |
        kubectl apply -f k8s/grafana-deployment.yaml
        kubectl apply -f k8s/grafana-service.yaml

    # Ingress
    - name: Apply ingress
      run: kubectl apply -f k8s/ingress.yaml

    # Rollout
    - name: Verify rollout
      run: |
        kubectl rollout status deployment/backend
        kubectl rollout status deployment/frontend
        kubectl rollout status deployment/analytics
        kubectl rollout status deployment/grafana
        kubectl rollout status deployment/prometheus

        echo ""
        echo "Waiting for Grafana LoadBalancer address (up to ~5 minutes)..."
        ADDR=""
        for i in $(seq 1 60); do
          echo ""
          echo "--- poll ${i}/60 ($(date -u +%H:%M:%S) UTC) ---"
          timeout 45s kubectl get svc grafana -o wide 2>&1 || echo "(kubectl get timed out or failed — check cluster connectivity)"
          JSON=""
          JSON=$(timeout 45s kubectl get svc grafana -o json 2>/dev/null) || true
          if [ -n "$JSON" ]; then
            IP=$(echo "$JSON" | jq -r '(.status.loadBalancer.ingress // []) | map(select(.ip != null and .ip != "")) | .[0].ip // empty')
            HOST=$(echo "$JSON" | jq -r '(.status.loadBalancer.ingress // []) | map(select(.hostname != null and .hostname != "")) | .[0].hostname // empty')
            if [ -n "$IP" ]; then
              ADDR="$IP"
              break
            fi
            if [ -n "$HOST" ]; then
              ADDR="$HOST"
              break
            fi
          fi
          sleep 5
        done
        if [ -z "$ADDR" ]; then
          echo ""
          echo "No LoadBalancer IP/hostname after waiting. Check Events below (quota, Autopilot, or wrong service type)."
          kubectl get svc grafana -o wide || true
          kubectl describe svc grafana || true
        else
          URL="http://${ADDR}/"
          echo ""
          echo "=========================================="
          echo "  Grafana: ${URL}"
          echo "=========================================="
          echo ""
          echo "::notice title=Grafana URL::${URL}"
        fi

    - name: Create GitHub Release
      if: "!startsWith(github.ref, 'refs/tags/')"
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        generate_release_notes: true
