name: Build & Deploy

on:
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  GCP_REGION: us-central1
  GCP_REPOSITORY: git-stats
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # REQUIRED for tags

    - uses: docker/setup-buildx-action@v3

    - name: Get next version
      id: version
      run: |
        git fetch --tags

        latest_tag=$(git tag --sort=-v:refname | head -n 1)

        if [ -z "$latest_tag" ]; then
          new_tag="v0.1.0"
        else
          version=${latest_tag#v}
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))
          new_tag="v$major.$minor.$patch"
        fi

        echo "New tag: $new_tag"
        echo "tag=$new_tag" >> $GITHUB_OUTPUT

    - name: Create and push tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}

    # Auth
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY_GHCR }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

    # Metadata
    - id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-backend
          ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/backend
        tags: |
          type=raw,value=${{ steps.version.outputs.tag }}

    - id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-frontend
          ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/frontend
        tags: |
          type=raw,value=${{ steps.version.outputs.tag }}

    # Backend
    - name: Build & push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./backend/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}

    - name: Deploy backend
      run: |
        gcloud run deploy gitstats-backend \
          --project=${{ env.GCP_PROJECT_ID }} \
          --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/backend:${{ steps.version.outputs.tag }} \
          --region=${{ env.GCP_REGION }} \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars="SUPABASE_URL=${{ secrets.SUPABASE_URL }},SECRET_KEY=${{ secrets.SECRET_KEY }},GIT_TOKEN=${{ secrets.GIT_TOKEN }},GIT_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }},GIT_CLIENT_SECRET=${{ secrets.GIT_CLIENT_SECRET }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},FRONTEND_URL=${{ secrets.FRONTEND_URL }}"

    - name: Get backend URL
      id: backend-url
      run: |
        URL=$(gcloud run services describe gitstats-backend \
          --project=${{ env.GCP_PROJECT_ID }} \
          --region=${{ env.GCP_REGION }} \
          --format='value(status.url)')
        echo "backend_url=$URL" >> $GITHUB_OUTPUT

    # Frontend
    - name: Build & push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        build-args: |
          VITE_API_URL=${{ steps.backend-url.outputs.backend_url }}
          VITE_GITHUB_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }}

    - name: Deploy frontend
      run: |
        gcloud run deploy gitstats-frontend \
          --project=${{ env.GCP_PROJECT_ID }} \
          --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/frontend:${{ steps.version.outputs.tag }} \
          --platform=managed \
          --region=${{ env.GCP_REGION }} \
          --allow-unauthenticated

    # Auto release notes
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        generate_release_notes: true
