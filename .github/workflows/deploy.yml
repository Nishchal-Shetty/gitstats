name: Build & Deploy

on:
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  GCP_REGION: us-central1
  GCP_REPOSITORY: git-stats
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
# Backend Job
  backend:
    runs-on: ubuntu-latest

    outputs:
      backend_url: ${{ steps.backend-url.outputs.backend_url }}
      tag: ${{ steps.version.outputs.tag }}

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Auto version bump
      - name: Determine next version
        id: version
        run: |
          git fetch --tags
          TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            VERSION=${TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH+1))
            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create git tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      # Metadata
      - id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-backend
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/backend
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}

      # Build + push
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}

      # Deploy
      - name: Deploy backend
        run: |
          gcloud run deploy gitstats-backend \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/backend:${{ steps.version.outputs.tag }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="
              SUPABASE_URL=${{ secrets.SUPABASE_URL }},
              SECRET_KEY=${{ secrets.SECRET_KEY }},
              GIT_TOKEN=${{ secrets.GIT_TOKEN }},
              GIT_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }},
              GIT_CLIENT_SECRET=${{ secrets.GIT_CLIENT_SECRET }},
              ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},
              FRONTEND_URL=${{ secrets.FRONTEND_URL }}"

      # Get backend URL
      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe gitstats-backend \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "backend_url=$URL" >> $GITHUB_OUTPUT

# Frontend Job (depends on backend only)
  frontend:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-frontend
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/frontend
          tags: |
            type=raw,value=${{ needs.backend.outputs.tag }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          build-args: |
            VITE_GITHUB_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }}

      - name: Deploy frontend
        run: |
          gcloud run deploy gitstats-frontend \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/frontend:${{ needs.backend.outputs.tag }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated
            --set-env-vars="VITE_API_URL=${BACKEND_URL}"

# Release Job
  release:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.backend.outputs.tag }}
          generate_release_notes: true