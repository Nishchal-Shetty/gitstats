name: Build & Deploy (Docker + GCP + Release)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  GCP_REGION: us-central1
  GCP_REPOSITORY: git-stats
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3

    # GHCR login
    - name: Login to GHCR
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY_GHCR }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # GCP WIF auth
    - name: Authenticate to GCP
      if: github.event_name != 'pull_request'
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Set up gcloud SDK
      if: github.event_name != 'pull_request'
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Set GCP project
      run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

    - name: Verify project
      run: gcloud config list

    - name: Configure Docker for GCP
      if: github.event_name != 'pull_request'
      run: |
        gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

    # Metadata
    - id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-backend
          ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/backend

    - id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}-frontend
          ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/frontend

    # Backend (no secrets here)
    - name: Build & push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./backend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}

    # Deploy Backend to Cloud Run
    - name: Deploy to Cloud Run (backend)
      if: github.event_name != 'pull_request'
      run: |
        gcloud run deploy gitstats-backend \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/backend:main \
          --region=${{ env.GCP_REGION }} \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars="
            SUPABASE_URL=${{ secrets.SUPABASE_URL }},
            SECRET_KEY=${{ secrets.SECRET_KEY }},
            GIT_TOKEN=${{ secrets.GIT_TOKEN }},
            GIT_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }},
            GIT_CLIENT_SECRET=${{ secrets.GIT_CLIENT_SECRET }},
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}"

    - name: Get backend URL
      id: backend-url
      run: |
        URL=$(gcloud run services describe gitstats-backend \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          --region ${{ env.GCP_REGION }} \
          --format 'value(status.url)')
        echo "BACKEND_URL=$URL" >> $GITHUB_ENV
        
    # Frontend (build-time env)
    - name: Build & push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        build-args: |
          VITE_API_URL=$BACKEND_URL
          VITE_GITHUB_CLIENT_ID=${{ secrets.GIT_CLIENT_ID }}

    # Deploy Frontend to Cloud Run
    - name: Deploy to Cloud Run (frontend)
      if: github.event_name != 'pull_request'
      run: |
        gcloud run deploy gitstats-frontend \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/frontend:main \
          --platform=managed \
          --region=${{ env.GCP_REGION }} \
          --allow-unauthenticated
          
    - name: Get frontend URL
      run: |
        gcloud run services describe gitstats-frontend \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          --region ${{ env.GCP_REGION }} \
          --format 'value(status.url)'

    # Release
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
